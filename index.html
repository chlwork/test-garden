<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮島花園 Soul Garden</title>
    <!-- 核心套件引入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background: #edf1ef; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; position: relative; display: flex; flex-direction: column; background: #edf1ef; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); }
        
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.15; transform: scale(1.05); }
        }
        .glow-effect { animation: subtle-pulse 4s ease-in-out infinite; }
        
        input[type="time"]::-webkit-calendar-picker-indicator { filter: opacity(0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CustomIcon = ({ name, size = 20, className = "", dateValue = null }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Check: <path d="M20 6 9 17l-5-5" />,
                ChevronUp: <path d="m18 15-6-6-6 6" />,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                ArrowLeft: <path d="m12 19-7-7 7-7M5 12h14" />,
                Map: <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1-1.788 0zM15 5.764v15M9 3.236v15" />,
                History: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 0h4m-4 0V4m9 4v4l3 2" />,
                Book: (
                    <g>
                        {/* 圖鑑圖示：三片重疊的葉子剪影，無線框設計 */}
                        <path d="M12 22C12 22 17 18 17 13C17 10 15 8 12 8C9 8 7 10 7 13C7 18 12 22 12 22Z" fill="currentColor" opacity="0.4" />
                        <path d="M16 20C16 20 20 17 20 13C20 10.5 18.5 9 16 9C13.5 9 12 10.5 12 13C12 17 16 20 16 20Z" fill="currentColor" opacity="0.6" />
                        <path d="M8 20C8 20 4 17 4 13C4 10.5 5.5 9 8 9C10.5 9 12 10.5 12 13C12 17 8 20 8 20Z" fill="currentColor" />
                    </g>
                ),
                Calendar: (
                    <g>
                        <defs>
                            <filter id="ultraSoftShadow" x="-50%" y="-50%" width="200%" height="200%">
                                <feDropShadow dx="0" dy="2" stdDeviation="3" floodOpacity="0.08"/>
                            </filter>
                        </defs>
                        <rect width="22" height="22" x="1" y="1" rx="5" ry="5" fill="white" filter="url(#ultraSoftShadow)" />
                        {dateValue && (
                            <text x="12" y="16" fontSize="11" fontWeight="300" textAnchor="middle" fill="#4a5d54" style={{fontFamily: "'Noto Serif TC', serif"}}>
                                {dateValue}
                            </text>
                        )}
                        <circle cx="20.5" cy="20.5" r="4" fill="#4a5d54" />
                        <path d="M20.5 18.5v4M18.5 20.5h4" stroke="white" strokeWidth="1" strokeLinecap="round" />
                    </g>
                ),
                Clock: <g><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></g>,
                Repeat: <g><path d="m17 2 4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="m7 22-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" /></g>,
                X: <path d="M18 6 6 18M6 6l12 12" />
            };

            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={name === 'Book' ? "none" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const PlantIcon = ({ type, sizeScale = 1, isToday = false }) => {
            const renderPlant = () => {
                switch (type) {
                    case 'bloom': 
                        return (
                            <g transform={`scale(${sizeScale}) translate(-10, -22)`}>
                                <path d="M10 22 V14" stroke="#4a5d54" strokeWidth="1" />
                                <path d="M10 14 C15 10, 18 14, 15 18 C12 22, 8 22, 5 18 C2 14, 5 10, 10 14" fill="#e8b5a8" />
                                <circle cx="10" cy="14" r="1.5" fill="#f7e1ad" />
                            </g>
                        );
                    case 'sprout':
                        return (
                            <g transform={`scale(${sizeScale}) translate(-8, -15)`}>
                                <path d="M8 15 Q13 5, 8 0 T3 15" fill="#8ca699" />
                                <path d="M8 15 Q4 8, 8 4" stroke="#f0f4f2" strokeWidth="0.5" fill="none" />
                            </g>
                        );
                    case 'grass':
                        return (
                            <g transform={`scale(${sizeScale}) translate(-5, -5)`}>
                                <circle cx="5" cy="5" r="3" fill="#a0b5ab" opacity="0.8" />
                                <path d="M3 5 L5 2 L7 5" stroke="#6d7d75" fill="none" strokeWidth="0.8" />
                            </g>
                        );
                    default:
                        return <circle cx="0" cy="0" r="1.2" fill="#bdccc4" opacity="0.5" />;
                }
            };
            return (
                <g>
                    {isToday && (
                        <circle cx="0" cy="0" r="12" fill="white" className="glow-effect" />
                    )}
                    {renderPlant()}
                </g>
            );
        };

        const App = () => {
            const [view, setView] = useState('garden'); 
            const [activeMonth, setActiveMonth] = useState({ id: 'feb', name: '如月', isHistory: false });
            const [selectedDay, setSelectedDay] = useState(new Date().getDate());
            const [isListExpanded, setIsListExpanded] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            
            const [inputTask, setInputTask] = useState('');
            const [inputTime, setInputTime] = useState('08:00');
            const [inputRepeat, setInputRepeat] = useState('none'); 
            const [inputDay, setInputDay] = useState(selectedDay);

            const [allData, setAllData] = useState(() => {
                const saved = localStorage.getItem('garden-zen-v9');
                if (saved) return JSON.parse(saved);
                
                const mockData = {};
                const today = new Date().getDate();
                for(let i=1; i<=31; i++) {
                    mockData[i] = [
                        { id: `t-${i}`, text: i % 2 === 0 ? '晨間澆灌心靈' : '晚間靜心閱讀', completed: i < today, time: '07:30', repeat: 'none' }
                    ];
                }
                return { 'feb': mockData, 'jan': {}, 'dec': {} };
            });

            useEffect(() => {
                localStorage.setItem('garden-zen-v9', JSON.stringify(allData));
            }, [allData]);

            const tasks = allData[activeMonth.id] || {};
            const currentDayTasks = tasks[selectedDay] || [];

            const stats = useMemo(() => {
                const monthTasks = allData['feb'] || {};
                let total = 0;
                let done = 0;
                Object.values(monthTasks).forEach(dayTasks => {
                    total += dayTasks.length;
                    done += dayTasks.filter(t => t.completed).length;
                });
                return { total, done, percent: total > 0 ? Math.round((done / total) * 100) : 0 };
            }, [allData]);

            const getDayStatus = (day) => {
                const dayTasks = tasks[day] || [];
                if (dayTasks.length === 0) return 'empty';
                const doneCount = dayTasks.filter(t => t.completed).length;
                if (doneCount === 0) return 'grass';
                if (doneCount < dayTasks.length) return 'sprout';
                return 'bloom';
            };

            const toggleTask = (day, taskId) => {
                if (activeMonth.isHistory) return;
                const dayTasks = tasks[day] || [];
                const newDayTasks = dayTasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
                setAllData({ ...allData, [activeMonth.id]: { ...tasks, [day]: newDayTasks } });
            };

            const addTask = (e) => {
                e.preventDefault();
                if (!inputTask.trim()) return;
                const baseId = Date.now();
                const newTaskTemplate = { text: inputTask, completed: false, time: inputTime, repeat: inputRepeat };
                const newMonthTasks = { ...tasks };
                
                if (inputRepeat === 'daily') {
                    for (let i = inputDay; i <= 31; i++) {
                        newMonthTasks[i] = [...(newMonthTasks[i] || []), { ...newTaskTemplate, id: `${baseId}-${i}` }];
                    }
                } else if (inputRepeat === 'weekly') {
                    for (let i = inputDay; i <= 31; i += 7) {
                        newMonthTasks[i] = [...(newMonthTasks[i] || []), { ...newTaskTemplate, id: `${baseId}-${i}` }];
                    }
                } else {
                    newMonthTasks[inputDay] = [...(newMonthTasks[inputDay] || []), { ...newTaskTemplate, id: baseId }];
                }
                setAllData({ ...allData, [activeMonth.id]: newMonthTasks });
                setInputTask('');
                setShowAddModal(false);
            };

            const ISLAND_POSITIONS = useMemo(() => Array.from({ length: 31 }).map((_, i) => {
                const row = Math.floor(i / 6);
                const col = i % 6;
                return { x: (col - row) * 16 + 50, y: (col + row) * 9 + 38 };
            }), []);

            return (
                <div className="app-container no-scrollbar">
                    <div className="fixed top-[-10%] right-[-10%] w-64 h-64 bg-[#f2ccc3] opacity-30 blur-[100px] pointer-events-none" />
                    <div className="fixed bottom-[10%] left-[-10%] w-80 h-80 bg-[#b1c9bc] opacity-30 blur-[120px] pointer-events-none" />

                    <header className="pt-16 pb-4 px-10 flex items-center justify-between relative z-10">
                        <div className="w-10">
                            {(activeMonth.isHistory || view === 'collection') && (
                                <button onClick={() => { setView('garden'); setActiveMonth({ id: 'feb', name: '如月', isHistory: false }); }} className="glass-card p-2 rounded-full transition-transform active:scale-90"><CustomIcon name="ArrowLeft" size={18} /></button>
                            )}
                        </div> 
                        <div className="text-center flex-1">
                            <h1 className="text-[16px] tracking-[0.6em] font-bold uppercase text-[#4a5d54]">
                                {view === 'collection' ? '萬物圖鑑' : (activeMonth.isHistory ? activeMonth.name : (view === 'garden' ? activeMonth.name : '記憶寫生'))}
                            </h1>
                            <div className="w-10 h-[2px] bg-[#bdccc4] mx-auto mt-3 rounded-full" />
                        </div>
                        <div className="w-10 flex justify-end">
                            {view === 'garden' && !activeMonth.isHistory && (
                                <button onClick={() => { setInputDay(selectedDay); setShowAddModal(true); }} className="hover:scale-110 transition-transform active:scale-95">
                                    <CustomIcon name="Calendar" size={32} dateValue={new Date().getDate()} />
                                </button>
                            )}
                        </div>
                    </header>

                    {view === 'garden' && (
                        <div className="flex flex-col grow">
                            <div className="shrink-0 relative flex items-center justify-center py-6">
                                <svg viewBox="0 0 100 100" className="w-full max-w-[360px] aspect-square overflow-visible">
                                    <path d="M25 50 L50 62 L75 50 L50 38 Z" fill="#b0bdb6" />
                                    {ISLAND_POSITIONS.map((pos, index) => (
                                        <g key={index} transform={`translate(${pos.x}, ${pos.y})`} className="cursor-pointer" onClick={() => setSelectedDay(index + 1)}>
                                            <PlantIcon 
                                                type={getDayStatus(index + 1)} 
                                                isToday={index + 1 === selectedDay} 
                                            />
                                        </g>
                                    ))}
                                </svg>
                            </div>
                            <div className="px-10 pb-32">
                                <div className="glass-card rounded-[35px] overflow-hidden shadow-sm">
                                    <div onClick={() => setIsListExpanded(!isListExpanded)} className="p-6 flex justify-between items-center cursor-pointer">
                                        <h2 className="text-sm tracking-widest text-[#4a5d54] font-bold">{selectedDay} 日的練習</h2>
                                        <CustomIcon name={isListExpanded ? "ChevronUp" : "ChevronDown"} size={16} />
                                    </div>
                                    {isListExpanded && (
                                        <div className="pb-8 px-8 space-y-4">
                                            {currentDayTasks.length > 0 ? currentDayTasks.map(task => (
                                                <div key={task.id} className="flex items-center gap-4 group">
                                                    <button onClick={() => toggleTask(selectedDay, task.id)} className={`shrink-0 w-5 h-5 rounded-full border-2 border-[#8ca699] flex items-center justify-center transition-colors ${task.completed ? 'bg-[#8ca699]' : ''}`}>
                                                        {task.completed && <CustomIcon name="Check" size={12} className="text-white" />}
                                                    </button>
                                                    <div className="flex flex-col grow">
                                                        <span className={`text-[15px] ${task.completed ? 'text-[#8ca699] line-through opacity-60' : 'text-[#2f3d36]'}`}>{task.text}</span>
                                                        <div className="flex items-center gap-2 text-[10px] text-[#8ca699] mt-0.5">
                                                            <span className="flex items-center gap-1"><CustomIcon name="Clock" size={10} />{task.time}</span>
                                                            {task.repeat !== 'none' && <span className="flex items-center gap-1"><CustomIcon name="Repeat" size={10} />{task.repeat === 'daily' ? '每日' : '每週'}</span>}
                                                        </div>
                                                    </div>
                                                </div>
                                            )) : (
                                                <div className="text-center py-4 flex flex-col items-center gap-2">
                                                    <p className="text-xs text-[#6d7d75] italic">尚未種下目標</p>
                                                    <button onClick={() => { setInputDay(selectedDay); setShowAddModal(true); }} className="text-[10px] text-[#4a5d54] underline tracking-widest">點擊右上角種植</button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'log' && (
                        <div className="px-10 pt-4 pb-32 space-y-8 animate-in fade-in duration-500">
                            <section className="space-y-4">
                                <h4 className="text-[11px] tracking-[0.4em] text-[#4a5d54] uppercase font-bold ml-2">本月成長：{activeMonth.name}</h4>
                                <div className="glass-card p-8 rounded-[40px] shadow-sm relative overflow-hidden">
                                    <div className="flex justify-between items-end relative z-10">
                                        <div className="space-y-1">
                                            <span className="text-3xl font-bold text-[#4a5d54]">{stats.percent}%</span>
                                            <p className="text-[10px] text-[#8ca699] tracking-widest uppercase">綻放進度</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-xs text-[#6d7d75]">{stats.done} / {stats.total} 次練習</span>
                                        </div>
                                    </div>
                                    <div className="w-full h-1.5 bg-[#edf1ef] rounded-full mt-6 overflow-hidden">
                                        <div className="h-full bg-[#8ca699] transition-all duration-1000" style={{ width: `${stats.percent}%` }} />
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <h4 className="text-[11px] tracking-[0.4em] text-[#4a5d54] uppercase font-bold ml-2">時光回想</h4>
                                {[{id:'jan', name:'睦月', desc:'冬日的寧靜練習'}, {id:'dec', name:'師走', desc:'年末的收穫總結'}].map(m => (
                                    <div key={m.id} onClick={() => { setActiveMonth({...m, isHistory:true}); setView('garden'); setSelectedDay(1); }} className="glass-card p-6 rounded-[30px] flex justify-between items-center cursor-pointer active:scale-95 transition-transform">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-[#edf1ef] flex items-center justify-center text-[#8ca699]">
                                                <CustomIcon name="History" size={16} />
                                            </div>
                                            <div>
                                                <span className="text-lg font-bold block text-[#2f3d36]">{m.name}</span>
                                                <span className="text-xs text-[#6d7d75]">{m.desc}</span>
                                            </div>
                                        </div>
                                        <CustomIcon name="ChevronRight" size={18} className="text-[#8ca699]" />
                                    </div>
                                ))}
                            </section>
                        </div>
                    )}

                    {view === 'collection' && (
                        <div className="px-10 pt-4 pb-32 space-y-8 animate-in fade-in duration-500">
                            <p className="text-[11px] text-[#8ca699] tracking-widest text-center italic">在修行的路途中，你已遇見...</p>
                            <div className="grid grid-cols-2 gap-6">
                                {[
                                    { type: 'bloom', name: '晨曦扶桑', desc: '達成所有今日練習時綻放' },
                                    { type: 'sprout', name: '青綠龜背', desc: '部分練習完成時的萌芽狀態' },
                                    { type: 'grass', name: '寂靜苔蘚', desc: '剛剛種下目標，等待灌溉' }
                                ].map((p, i) => (
                                    <div key={i} className="glass-card p-6 rounded-[35px] flex flex-col items-center text-center space-y-4">
                                        <div className="w-20 h-20 bg-white/40 rounded-full flex items-center justify-center">
                                            <svg viewBox="0 0 40 40" className="w-16 h-16 overflow-visible">
                                                <PlantIcon type={p.type} sizeScale={2} />
                                            </svg>
                                        </div>
                                        <div>
                                            <h5 className="text-[14px] font-bold text-[#4a5d54] tracking-widest">{p.name}</h5>
                                            <p className="text-[9px] text-[#8ca699] mt-1 leading-relaxed">{p.desc}</p>
                                        </div>
                                    </div>
                                ))}
                                <div className="glass-card p-6 rounded-[35px] flex flex-col items-center justify-center text-center opacity-40 border-dashed border-2 border-[#bdccc4]">
                                    <div className="w-12 h-12 bg-[#bdccc4] rounded-full flex items-center justify-center text-white mb-2 text-xl">?</div>
                                    <p className="text-[10px] text-[#8ca699] tracking-widest">尚未解鎖</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[280px] h-14 glass-card rounded-full flex justify-around items-center px-4 shadow-lg z-[50]">
                        <button onClick={() => {setView('garden'); setActiveMonth({id:'feb', name:'如月', isHistory:false})}} className={`transition-all ${view === 'garden' && !activeMonth.isHistory ? 'text-[#4a5d54] scale-110' : 'text-[#8ca699]'}`}><CustomIcon name="Map" size={22} /></button>
                        <button onClick={() => setView('collection')} className={`transition-all ${view === 'collection' ? 'text-[#4a5d54] scale-110' : 'text-[#8ca699]'}`}><CustomIcon name="Book" size={22} /></button>
                        <button onClick={() => setView('log')} className={`transition-all ${view === 'log' || activeMonth.isHistory ? 'text-[#4a5d54] scale-110' : 'text-[#8ca699]'}`}><CustomIcon name="History" size={22} /></button>
                    </nav>

                    {showAddModal && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-[#2f3d36]/20 backdrop-blur-sm p-4" onClick={() => setShowAddModal(false)}>
                            <div className="w-full max-w-[400px] bg-white rounded-[40px] p-8 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <span className="font-bold text-xs tracking-widest text-[#4a5d54] uppercase">種下期許</span>
                                    <button onClick={()=>setShowAddModal(false)} className="text-[#8ca699] p-2 hover:bg-gray-100 rounded-full"><CustomIcon name="X" size={20}/></button>
                                </div>
                                <form onSubmit={addTask} className="space-y-6">
                                    <input autoFocus type="text" value={inputTask} onChange={e=>setInputTask(e.target.value)} placeholder="你想完成的小練習..." className="w-full border-b-2 border-[#edf1ef] py-2 outline-none text-[#2f3d36] placeholder:text-[#bdccc4] bg-transparent text-lg" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select value={inputDay} onChange={e=>setInputDay(parseInt(e.target.value))} className="w-full bg-[#f8faf9] rounded-2xl p-3 text-sm text-[#4a5d54] outline-none">
                                            {Array.from({length: 31}).map((_, i) => <option key={i+1} value={i+1}>{i+1} 日</option>)}
                                        </select>
                                        <input type="time" value={inputTime} onChange={e=>setInputTime(e.target.value)} className="w-full bg-[#f8faf9] rounded-2xl p-3 text-sm text-[#4a5d54] outline-none" />
                                    </div>
                                    <div className="flex gap-2">
                                        {['none', 'daily', 'weekly'].map(opt => (
                                            <button key={opt} type="button" onClick={()=>setInputRepeat(opt)} className={`flex-1 py-2 rounded-xl text-xs transition-all ${inputRepeat === opt ? 'bg-[#4a5d54] text-white' : 'bg-[#f8faf9] text-[#8ca699]'}`}>
                                                {opt === 'none' ? '單次' : opt === 'daily' ? '每日' : '每週'}
                                            </button>
                                        ))}
                                    </div>
                                    <button type="submit" className="w-full bg-[#4a5d54] text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition-transform">確認種下</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
